name: Generate source manifest artifact

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: refresh-source-manifest-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Remove temporary generator workflow from candidate tree
        run: rm .github/workflows/refresh-source-manifest-artifact.yml
      - name: Rebuild canonical source manifest
        run: python3 tools/release/build_source_archive.py --output /tmp/deeplus-source.zip
      - name: Validate generated workspace
        run: python3 tools/validators/validate_workspace.py
      - name: Upload refreshed manifest
        uses: actions/upload-artifact@v4
        with:
          name: refreshed-source-tree-manifest
          path: release/source-tree-manifest.json
          if-no-files-found: error
