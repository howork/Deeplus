name: Commit refreshed source manifest

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: commit-refreshed-source-manifest-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  refresh:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Remove temporary workflow and regenerate manifest
        run: |
          rm .github/workflows/commit-refreshed-source-manifest.yml
          python3 tools/release/build_source_archive.py --output /tmp/deeplus-source.zip
          python3 tools/validators/validate_workspace.py
      - name: Commit refreshed manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore(ci): refresh canonical source manifest"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
